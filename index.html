<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Çekiliş Oluştur</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>🎉 Yeni Çekiliş Oluştur</h2>
        
        <label>Süre (Dakika: 1 - 10):</label>
        <input type="number" id="duration" min="1" max="10" value="5">
        
        <label>Kazanan Sayısı:</label>
        <input type="number" id="winners" min="1" value="1">
        
        <button onclick="createGiveaway()" id="btnCreate">Oluştur</button>
        <p id="status"></p>
    </div>

    <script>
        // Sizin güncel linkiniz eklendi:
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxujMzI0q2Ardqz0k1KVzhp2dSoOF5ys6ACvUAb8kByjRKRrMkxe3hvtbpPixETNzDA/exec';

        function generateId() {
            return Math.random().toString(36).substr(2, 6).toUpperCase();
        }

        async function createGiveaway() {
            const duration = document.getElementById('duration').value;
            const winners = document.getElementById('winners').value;
            const btn = document.getElementById('btnCreate');
            const status = document.getElementById('status');

            if(duration < 1 || duration > 10) return alert("Süre 1 ile 10 dakika arası olmalı!");

            btn.disabled = true;
            status.innerText = "Çekiliş oluşturuluyor, lütfen bekleyin...";

            const id = generateId();
            
            try {
                // CORS hatasını önlemek için GET metodu kullanılıyor
                const response = await fetch(`${SCRIPT_URL}?action=create&id=${id}&duration=${duration}&winners=${winners}`);
                const result = await response.json();
                
                if(result.success) {
                    // Başarılıysa doğrudan canlı çekiliş odasına yönlendir
                    window.location.href = `giveaway.html?id=${id}&host=true`;
                }
            } catch (error) {
                status.innerText = "Bir hata oluştu!";
                btn.disabled = false;
                console.error("Hata Detayı:", error);
            }
        }
    </script>
</body>
</html>
